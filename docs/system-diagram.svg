<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1140" height="560" fill="#ffffff" />
  <text x="570" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">
    Office Energy Monitor — System Data Flow
  </text>

  <!-- Simulated Device Layer -->
  <rect x="30" y="200" width="170" height="120" rx="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="1.5" />
  <text x="115" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Simulated</text>
  <text x="115" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Device Layer</text>
  <text x="115" y="292" text-anchor="middle" font-size="11" fill="#4b5563">15 devices · ESP32</text>
  <text x="115" y="307" text-anchor="middle" font-size="11" fill="#4b5563">concept (Wokwi)</text>

  <!-- Backend container -->
  <rect x="250" y="70" width="420" height="430" rx="12" fill="#fafbfc" stroke="#4b5563" stroke-width="1.5" />
  <text x="460" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Backend — Node/TS (single process, one source of truth)</text>

  <rect x="285" y="118" width="180" height="48" rx="8" fill="#f4f6f8" stroke="#4b5563" stroke-width="1.5" />
  <text x="375" y="147" text-anchor="middle" font-size="13" fill="#111827">Simulation Engine</text>

  <rect x="285" y="192" width="350" height="58" rx="8" fill="#fdf0d0" stroke="#f0b429" stroke-width="2.5" />
  <text x="460" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">State Store</text>
  <text x="460" y="235" text-anchor="middle" font-size="11" fill="#7a5c00">SINGLE SOURCE OF TRUTH (15 devices)</text>

  <rect x="285" y="278" width="165" height="48" rx="8" fill="#f4f6f8" stroke="#4b5563" stroke-width="1.5" />
  <text x="367" y="307" text-anchor="middle" font-size="12" fill="#111827">Usage Accumulator</text>

  <rect x="470" y="278" width="165" height="48" rx="8" fill="#f4f6f8" stroke="#4b5563" stroke-width="1.5" />
  <text x="552" y="307" text-anchor="middle" font-size="12" fill="#111827">Alerts Engine</text>

  <rect x="285" y="352" width="350" height="58" rx="8" fill="#fdf0d0" stroke="#f0b429" stroke-width="2.5" />
  <text x="460" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">REST API + Socket.IO</text>
  <text x="460" y="395" text-anchor="middle" font-size="11" fill="#7a5c00">/api/state · /room · /usage · /alerts · state:update · alert:new</text>

  <!-- internal arrows -->
  <line x1="375" y1="166" x2="410" y2="192" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="367" y1="250" x2="367" y2="278" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="552" y1="250" x2="552" y2="278" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="367" y1="326" x2="400" y2="352" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="552" y1="326" x2="520" y2="352" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Dashboard -->
  <rect x="730" y="100" width="230" height="150" rx="10" fill="#e8f0fe" stroke="#3b82f6" stroke-width="1.8" />
  <text x="845" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Web Dashboard</text>
  <text x="845" y="148" text-anchor="middle" font-size="11" fill="#374151">React + Vite</text>
  <text x="845" y="172" text-anchor="middle" font-size="11" fill="#374151">Floorplan · Power meter</text>
  <text x="845" y="190" text-anchor="middle" font-size="11" fill="#374151">Device panel · Alerts</text>
  <text x="845" y="214" text-anchor="middle" font-size="11" fill="#374151">Live, no page refresh</text>

  <!-- Bot -->
  <rect x="730" y="300" width="230" height="150" rx="10" fill="#eef7ee" stroke="#3fb950" stroke-width="1.8" />
  <text x="845" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Discord Bot</text>
  <text x="845" y="348" text-anchor="middle" font-size="11" fill="#374151">discord.js</text>
  <text x="845" y="372" text-anchor="middle" font-size="11" fill="#374151">!status · !room · !usage</text>
  <text x="845" y="390" text-anchor="middle" font-size="11" fill="#374151">LLM humanized replies</text>
  <text x="845" y="414" text-anchor="middle" font-size="11" fill="#374151">Proactive alert posts</text>

  <!-- User -->
  <rect x="1000" y="230" width="110" height="100" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.8" />
  <text x="1055" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Boss &amp;</text>
  <text x="1055" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Team</text>

  <!-- external arrows -->
  <line x1="200" y1="245" x2="285" y2="216" stroke="#4b5563" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="238" y="214" text-anchor="middle" font-size="10" fill="#4b5563">states</text>

  <line x1="635" y1="368" x2="730" y2="175" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="690" y="258" text-anchor="middle" font-size="10" fill="#3b82f6">push + REST</text>

  <line x1="635" y1="381" x2="730" y2="375" stroke="#3fb950" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="690" y="368" text-anchor="middle" font-size="10" fill="#2e7d32">REST + alert:new</text>

  <line x1="960" y1="175" x2="1000" y2="255" stroke="#b45309" stroke-width="1.8" marker-end="url(#arrow)" />
  <line x1="960" y1="375" x2="1000" y2="305" stroke="#b45309" stroke-width="1.8" marker-end="url(#arrow)" />

  <!-- demo-mode return -->
  <line x1="845" y1="250" x2="845" y2="300" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)" />
  <text x="978" y="475" text-anchor="middle" font-size="10" fill="#9ca3af">dashed = demo-mode POST /api/sim/settime</text>
</svg>
